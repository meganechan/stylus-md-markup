# POC convenience: build + run, bind-mounting your Documents directory.
# Override DOCS_HOST to point at the folder of .md files you want to review.
services:
  stylus-md-markup:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DOCS_DIR=/docs
      - INK_DIR=/ink
    volumes:
      # host folder of .md documents -> /docs, mounted READ-ONLY (ADR-0002):
      # the tool physically cannot modify the author's source files.
      - ${DOCS_HOST:-./docs-sample}:/docs:ro
      # separate writable store for annotation sidecars (mirrors doc paths).
      - ${INK_HOST:-./ink-data}:/ink
