# POC convenience: build + run, bind-mounting your Documents directory.
# Override DOCS_HOST to point at the folder of .md files you want to review.
services:
  stylus-md-markup:
    build: .
    ports:
      # host port overridable: HOST_PORT=8095 docker compose up
      - "${HOST_PORT:-8080}:8080"
    environment:
      - PORT=8080
      - DOCS_DIR=/docs
      - JOBS_DIR=/jobs
      # post-back to te-kb (ADR-0006). TEKB_PASTE_TOKEN is a secret injected at
      # runtime (coolify) — never commit it. Without it, publish is skipped.
      - TEKB_PASTE_TOKEN=${TEKB_PASTE_TOKEN:-}
      - TEKB_BASE_URL=${TEKB_BASE_URL:-https://api.kb.notscam.space}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-https://ink.notscam.space}
      - POSTBACK_TTL_HOURS=${POSTBACK_TTL_HOURS:-720}
      # "once" = 1 ref per job (skip re-append on repeat saves); "always" = history
      - POSTBACK_APPEND_MODE=${POSTBACK_APPEND_MODE:-once}
    volumes:
      # markdown Backdrop source -> /docs, mounted READ-ONLY (ADR-0002):
      # the tool physically cannot modify the author's source files.
      - ${DOCS_HOST:-./docs-sample}:/docs:ro
      # separate writable store for Markup Jobs (strokes + md + tiles).
      - ${JOBS_HOST:-./jobs-data}:/jobs
