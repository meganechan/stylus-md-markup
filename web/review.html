<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="referrer" content="no-referrer" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Review Desk</title>
  </head>
  <body class="desk">
    <main id="desk">
      <header id="desk-head">
        <span id="desk-title">🗂️ Review Desk</span>
        <span id="conn" class="conn" hidden></span>
      </header>

      <!-- notice: shown for /review (no token), after a decision, or on error -->
      <section id="notice" hidden>
        <div class="notice-card">
          <h1 id="notice-title">🗂️ Review Desk</h1>
          <p id="notice-msg">เปิด review จากลิงก์ของคุณ (<code>/r/&lt;token&gt;</code>)</p>
        </div>
      </section>

      <!-- one review (opened by token) -->
      <section id="review" hidden>
        <div id="review-meta">
          <h2 id="r-title"></h2>
          <div class="r-sub">
            <span id="r-asker"></span> · รอบ <span id="r-round"></span> ·
            <span id="r-deadline"></span>
          </div>
          <div id="r-context" class="r-context"></div>
          <details id="r-history" hidden>
            <summary>ประวัติรอบก่อนหน้า</summary>
            <ol id="r-history-list"></ol>
          </details>
        </div>

        <div id="desk-toolbar"></div>

        <div id="stage">
          <div id="viewport">
            <div id="page">
              <article id="preview" class="markdown-body"></article>
              <canvas id="ink"></canvas>
            </div>
          </div>
          <div id="r-unsupported" class="unsupported" hidden></div>
        </div>

        <div id="review-actions">
          <textarea id="comment" placeholder="ความเห็น (พิมพ์ได้ หรือเขียนปากกาทับเอกสารด้านบน)"></textarea>
          <div class="decisions">
            <button class="decide approve" data-outcome="approve">✅ Approve</button>
            <button class="decide return" data-outcome="return">↩️ Return</button>
            <button class="decide reject" data-outcome="reject">⛔ Reject</button>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="/src/desk/main.ts"></script>
  </body>
</html>
